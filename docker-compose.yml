services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: tracewell
      POSTGRES_PASSWORD: tracewell
      POSTGRES_DB: tracewell
    ports:
      - "5432:5432"
    volumes:
      - tracewell_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  tracewell_pg:
